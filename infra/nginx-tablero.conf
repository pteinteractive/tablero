# ─── Nginx — srv-cpan01 (10.150.111.50) ──────────────────────────────────────
# Archivo : /etc/nginx/conf.d/ircnl.conf
# Nginx   : 1.26.3 / AlmaLinux
# HTTPS   : Terminado en Nginx Proxy Manager (10.150.130.158)
#           Este servidor solo recibe HTTP interno desde el NPM
# ─────────────────────────────────────────────────────────────────────────────

# Upstream: API Node.js (srvu-cpan03)
upstream api_backend {
    server 10.150.111.52:3000;
    keepalive 8;
}

# Upstream: PHP Legacy (srv-cpan02)
upstream php_backend {
    server 10.150.111.51:80;
    keepalive 16;
}

# ── Servidor principal — tablero.ircnl.gob.mx ─────────────────────────────────
server {
    listen      80;
    server_name tablero.ircnl.gob.mx 10.150.111.50;

    # Seguridad: no revelar versión de Nginx
    server_tokens off;

    # Headers de seguridad (el SSL/HSTS lo agrega el NPM externamente)
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin"  always;

    # ── Dashboard React SPA ──────────────────────────────────────────────────
    location /dashboard/ {
        alias /var/www/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        # Archivos JS/CSS con hash en nombre: cache largo
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirigir raíz al dashboard
    location = / {
        return 301 /dashboard/;
    }

    # ── API Node.js ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass            http://api_backend/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_set_header      Connection         "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        # Sin restricción de IP: el acceso viene de Internet via NPM
        # La autenticación JWT en el worker controla el acceso
    }

    # ── Certificaciones PHP (aplicación legacy) ───────────────────────────────
    location ^~ /certificaciones/ {
        proxy_pass            http://php_backend/certificaciones/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_redirect        off;
    }

    # ── Health check interno ──────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Bloquear acceso a archivos sensibles ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /php/ {
        return 404;
    }
}
