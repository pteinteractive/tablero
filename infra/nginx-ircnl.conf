# ─── Nginx Proxy Inverso — srv-cpan01 (10.150.111.50) ────────────────────────
# Archivo: /etc/nginx/conf.d/ircnl.conf
# Versión: Nginx 1.26.3 / AlmaLinux 10.1
# ─────────────────────────────────────────────────────────────────────────────

# Upstream: backend PHP (srv-cpan02)
upstream php_backend {
    server 10.150.111.51:80;
    keepalive 16;
}

# Upstream: API Node.js (srvu-cpan03)
upstream api_backend {
    server 10.150.111.52:3000;
    keepalive 8;
}

# ── HTTP → redirect permanente ────────────────────────────────────────────────
server {
    listen       80;
    server_name  _;

    # Redirigir / → /php/
    location = / {
        return 301 /php/;
    }

    # Dashboard frontend (React SPA)
    location /dashboard/ {
        alias /var/www/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # API Node.js
    location /api/ {
        proxy_pass         http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Solo desde red interna
        allow 10.150.0.0/16;
        deny  all;
    }

    # Backend PHP
    location /php/ {
        proxy_pass         http://php_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
