const _TS_fts = (ts) => {
  if (!ts) return "–";
  const d = new Date(ts);
  return d.toLocaleDateString("es-MX", { day: "2-digit", month: "2-digit", year: "numeric" })
    + " " + d.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
};

const msToS = (ms) => {
  if (!ms) return "–";
  if (ms < 1000) return `${ms}ms`;
  if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
  const m = Math.floor(ms / 60000);
  const s = Math.round((ms % 60000) / 1000);
  if (m < 60) return `${m}m ${s}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
};

const _TS_N = (n) => (n ?? 0).toLocaleString("es-MX");

function TabSyncLog({ T }) {
  const [logs,        setLogs]        = useState(DEMO_LOGS);
  const [loading,     setLoading]     = useState(false);
  const [filtroTipo,  setFiltroTipo]  = useState("todos");
  const [expandedId,  setExpandedId]  = useState(null);
  const [autoRefresh, setAutoRefresh] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(new Date());

  // En producción: fetch("/api/sync/logs?limit=100")
  const refrescar = useCallback(() => {
    setLoading(true);
    setTimeout(() => {
      setLogs(DEMO_LOGS);
      setLastRefresh(new Date());
      setLoading(false);
    }, 600);
  }, []);

  // Auto-refresh cada 60s si está activo
  useEffect(() => {
    if (!autoRefresh) return;
    const t = setInterval(refrescar, 60000);
    return () => clearInterval(t);
  }, [autoRefresh, refrescar]);

  const filtrados = logs.filter(l =>
    filtroTipo === "todos" || l.tipo === filtroTipo
  );

  // Resumen de hoy
  const hoy = new Date().toISOString().slice(0, 10);
  const logsHoy   = logs.filter(l => l.inicio.startsWith(hoy));
  const erroresHoy= logsHoy.filter(l => l.tipo === "error").length;
  const okHoy     = logsHoy.filter(l => l.tipo === "incremental" && !l.tickets_error).length;
  const totalSync = logsHoy.filter(l => l.tipo === "incremental").length;
  const ticketsHoy= logsHoy.reduce((s, l) => s + (l.tickets_nuevos || 0), 0);

  const TIPO_CFG = {
    carga_inicial: { label: "Carga inicial",  color: T.blue,   icon: "⬇" },
    incremental:   { label: "Incremental",    color: T.green,  icon: "↻"  },
    cache_clear:   { label: "Cache clear",    color: T.slate,  icon: "🗑" },
    error:         { label: "Error",          color: T.red,    icon: "⚠"  },
  };

  const card = (extra = {}) => ({
    background: T.card, border: `1px solid ${T.bd1}`,
    borderRadius: 12, padding: "18px 20px",
    boxShadow: T.shadow, ...extra,
  });

  const accentBar = (c) => ({
    position: "absolute", top: 0, left: 0, right: 0, height: 3,
    background: `linear-gradient(90deg, ${c}, ${c}66)`,
  });

  return (
    <div>
      {/* Encabezado con controles */}
      <div style={{ marginBottom: 22 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: `${T.terrac}18`, border: `1.5px solid ${T.terrac}44`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <div style={{ width: 10, height: 10, background: T.terrac, borderRadius: 2, transform: "rotate(45deg)" }} />
            </div>
            <span style={{ fontFamily: _TS_SERIFS, fontSize: 20, fontWeight: 700, color: T.t1, letterSpacing: "-.015em" }}>
              Log de Sincronización
            </span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {/* Auto-refresh toggle */}
            <button onClick={() => setAutoRefresh(a => !a)} style={{
              display: "flex", alignItems: "center", gap: 7, padding: "7px 14px",
              borderRadius: 8, border: `1.5px solid ${autoRefresh ? T.green : T.bd2}`,
              background: autoRefresh ? `${T.green}15` : "transparent",
              color: autoRefresh ? T.green : T.t3,
              fontFamily: _TS_MONOS, fontSize: 10.5, fontWeight: 600, cursor: "pointer",
              transition: "all .15s",
            }}>
              <span style={{
                width: 8, height: 8, borderRadius: "50%",
                background: autoRefresh ? T.green : T.t4,
                display: "inline-block",
                boxShadow: autoRefresh ? `0 0 6px ${T.green}` : "none",
              }} />
              {autoRefresh ? "Auto ON" : "Auto OFF"} (60s)
            </button>
            {/* Refresh manual */}
            <button onClick={refrescar} disabled={loading} style={{
              display: "flex", alignItems: "center", gap: 7, padding: "7px 16px",
              borderRadius: 8, border: `1.5px solid ${T.slate}`,
              background: `${T.slate}15`, color: T.slate,
              fontFamily: _TS_MONOS, fontSize: 10.5, fontWeight: 600, cursor: loading ? "wait" : "pointer",
              opacity: loading ? .6 : 1,
            }}>
              {loading ? "↻ Cargando…" : "↻ Actualizar"}
            </button>
          </div>
        </div>
        <div style={{ fontFamily: _TS_MONOS, fontSize: 10, color: T.t4, marginTop: 6, marginLeft: 40 }}>
          srvu-cpan03 (10.150.111.52) · worker.js · PM2 api-ircnl · Último refresh: {_TS_fts(lastRefresh.toISOString())}
        </div>
      </div>

      {/* KPIs del día */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 20 }} className="g4">
        {[
          { label: "Syncs hoy", value: `${okHoy}/${totalSync}`, sub: "exitosos / programados", color: okHoy === totalSync ? T.green : T.amber, icon: "↻" },
          { label: "Errores hoy", value: erroresHoy, sub: erroresHoy > 0 ? "requieren revisión" : "sin errores", color: erroresHoy > 0 ? T.red : T.green, icon: erroresHoy > 0 ? "⚠" : "✓" },
          { label: "Tickets hoy", value: _TS_N(ticketsHoy), sub: "nuevos en BD local", color: T.blue, icon: "📋" },
          { label: "Próximo sync", value: "→ 18:00", sub: "CST · L-V · cada hora", color: T.teal, icon: "⏰" },
        ].map((k, i) => (
          <div key={i} style={{ ...card(), position: "relative", overflow: "hidden" }}>
            <div style={accentBar(k.color)} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", paddingTop: 4 }}>
              <div>
                <div style={{ fontFamily: _TS_SERIFS, fontSize: 28, fontWeight: 700, color: k.color, lineHeight: 1, marginBottom: 7 }}>{k.value}</div>
                <div style={{ fontFamily: _TS_MONOS, fontSize: 11, color: T.t2, fontWeight: 500 }}>{k.label}</div>
                <div style={{ fontFamily: _TS_MONOS, fontSize: 9.5, color: T.t4, marginTop: 3 }}>{k.sub}</div>
              </div>
              <div style={{ width: 38, height: 38, borderRadius: 9, background: `${k.color}15`, border: `1px solid ${k.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{k.icon}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Filtro de tipo */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontFamily: _TS_MONOS, fontSize: 10, color: T.t4, marginRight: 4 }}>FILTRAR:</span>
        {[
          ["todos",         "Todos",         T.t3,   T.bd2],
          ["incremental",   "Incremental",   T.green, T.green],
          ["error",         "Errores",       T.red,   T.red],
          ["cache_clear",   "Cache Clear",   T.slate, T.slate],
          ["carga_inicial", "Carga Inicial", T.blue,  T.blue],
        ].map(([val, lbl, c, bc]) => (
          <button key={val} onClick={() => setFiltroTipo(val)} style={{
            background: filtroTipo === val ? `${c}18` : "transparent",
            color: filtroTipo === val ? c : T.t3,
            border: `1.5px solid ${filtroTipo === val ? bc : T.bd1}`,
            borderRadius: 7, padding: "6px 14px", cursor: "pointer",
            fontFamily: _TS_MONOS, fontSize: 10.5, fontWeight: 500, transition: "all .15s",
          }}>{lbl} {filtroTipo === val && filtrados.length > 0 && `(${filtrados.length})`}</button>
        ))}
      </div>

      {/* Tabla de logs */}
      <div style={{ ...card(), padding: 0, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", width: "100%" }}>
            <thead>
              <tr>
                {["ID", "Tipo", "Inicio", "Duración", "Procesados", "Nuevos", "Actualizados", "Errores", "Último ID", "Estado"].map(h => (
                  <th key={h} style={{
                    padding: "11px 14px", fontFamily: _TS_MONOS,
                    fontSize: 10, letterSpacing: ".1em", fontWeight: 500, textTransform: "uppercase",
                    color: T.t3, background: T.row2, borderBottom: `2px solid ${T.bd1}`,
                    whiteSpace: "nowrap", textAlign: "left",
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtrados.map((log, i) => {
                const cfg = TIPO_CFG[log.tipo] || { label: log.tipo, color: T.t4, icon: "•" };
                const isExp = expandedId === log.id;
                const hasError = log.tipo === "error" || log.tickets_error > 0;

                return (
                  <>
                    <tr key={log.id}
                      onClick={() => setExpandedId(isExp ? null : log.id)}
                      style={{
                        cursor: "pointer",
                        background: i % 2 === 0 ? T.card : T.row2,
                        borderLeft: hasError ? `3px solid ${T.red}` : isExp ? `3px solid ${cfg.color}` : "3px solid transparent",
                        transition: "background .1s",
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = `${cfg.color}0d`}
                      onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? T.card : T.row2}>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 10.5, color: T.t4, borderBottom: `1px solid ${T.bd1}` }}>#{log.id}</td>

                      <td style={{ padding: "10px 14px", borderBottom: `1px solid ${T.bd1}` }}>
                        <span style={{
                          fontFamily: _TS_MONOS, fontSize: 10, fontWeight: 600,
                          color: cfg.color, background: `${cfg.color}18`,
                          border: `1px solid ${cfg.color}44`, borderRadius: 4,
                          padding: "2px 9px", whiteSpace: "nowrap",
                        }}>{cfg.icon} {cfg.label}</span>
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 10.5, color: T.t2, borderBottom: `1px solid ${T.bd1}`, whiteSpace: "nowrap" }}>
                        {_TS_fts(log.inicio)}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 11, color: T.t2, fontWeight: 600, borderBottom: `1px solid ${T.bd1}` }}>
                        {msToS(log.duracion_ms)}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 12, color: T.t2, fontWeight: 600, borderBottom: `1px solid ${T.bd1}`, textAlign: "right" }}>
                        {_TS_N(log.tickets_procesados)}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 12, color: T.green, fontWeight: 700, borderBottom: `1px solid ${T.bd1}`, textAlign: "right" }}>
                        +{_TS_N(log.tickets_nuevos)}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 12, color: T.blue, fontWeight: 700, borderBottom: `1px solid ${T.bd1}`, textAlign: "right" }}>
                        ~{_TS_N(log.tickets_actualizados)}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 12, fontWeight: 700, borderBottom: `1px solid ${T.bd1}`, textAlign: "right", color: log.tickets_error > 0 ? T.red : T.t4 }}>
                        {log.tickets_error > 0 ? `⚠ ${log.tickets_error}` : "—"}
                      </td>

                      <td style={{ padding: "10px 14px", fontFamily: _TS_MONOS, fontSize: 10, color: T.t4, borderBottom: `1px solid ${T.bd1}` }}>
                        {log.ultimo_ticket_id ? `…${log.ultimo_ticket_id.slice(-8)}` : "–"}
                      </td>

                      <td style={{ padding: "10px 14px", borderBottom: `1px solid ${T.bd1}` }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: hasError ? T.red : T.green, boxShadow: `0 0 5px ${hasError ? T.red : T.green}` }} />
                          <span style={{ fontFamily: _TS_MONOS, fontSize: 10, color: hasError ? T.red : T.green, fontWeight: 600 }}>
                            {hasError ? "ERROR" : "OK"}
                          </span>
                          {log.error_detalle && <span style={{ fontFamily: _TS_MONOS, fontSize: 9.5, color: T.t4, marginLeft: 4 }}>▾ ver</span>}
                        </div>
                      </td>
                    </tr>

                    {/* Fila expandida — detalle del evento */}
                    {isExp && (
                      <tr key={`${log.id}-detail`}>
                        <td colSpan={10} style={{ padding: 0, background: `${cfg.color}08`, borderBottom: `1px solid ${T.bd1}` }}>
                          <div style={{ padding: "14px 20px 16px" }}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: log.error_detalle ? 14 : 0 }}>
                              <div>
                                <div style={{ fontFamily: _TS_MONOS, fontSize: 9, color: T.t4, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Inicio</div>
                                <div style={{ fontFamily: _TS_MONOS, fontSize: 11, color: T.t2 }}>{_TS_fts(log.inicio)}</div>
                              </div>
                              <div>
                                <div style={{ fontFamily: _TS_MONOS, fontSize: 9, color: T.t4, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Fin</div>
                                <div style={{ fontFamily: _TS_MONOS, fontSize: 11, color: T.t2 }}>{_TS_fts(log.fin)}</div>
                              </div>
                              <div>

  if (h>24) return `${Math.floor(h/24)}d ${h%24}h`;
  if (h>0)  return `${h}h ${m}m`;
  return `${m}min`;
};

                ⚠ Las URLs de documentos son temporales y expiran entre 1 y 24 horas. Para visualizarlos, acceder desde HubSpot o desde el worker en producción.
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Vista de búsqueda / resultados ────────────────────────────────────
    return (
      <div>
        <SecHead title="Búsqueda de Trámites" sub="Consulta individual por expediente, correo, nombre, folio, ID o CURP · Datos desde BD local (caché sincronizado c/hora)"/>

        {/* Panel de búsqueda */}
        <div style={{...card(), position:"relative", overflow:"hidden", marginBottom:20, borderLeft:`4px solid ${T.terrac}`}}>
          <div style={{fontFamily:MONOS, fontSize:9.5, fontWeight:700, color:T.t3, letterSpacing:".12em", textTransform:"uppercase", marginBottom:16}}>
            Criterio de búsqueda
          </div>

          {/* Selector de modo */}
          <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:18}}>
            {SEARCH_MODES.map(m=>(
              <button key={m.id} onClick={()=>setSearchMode(m.id)} style={{
                background:searchMode===m.id ? T.terrac : "transparent",
                color:searchMode===m.id ? "#fff" : T.t2,
                border:`1.5px solid ${searchMode===m.id ? T.terrac : T.bd2}`,
                borderRadius:8, padding:"7px 14px", cursor:"pointer",
                fontFamily:MONOS, fontSize:11, fontWeight:500, transition:"all .15s",
              }}>{m.label}</button>
            ))}
          </div>

          {/* Input de búsqueda */}
          <div style={{display:"flex", gap:10, alignItems:"center", flexWrap:"wrap", marginBottom:18}}>
            <div style={{flex:1, minWidth:240, position:"relative"}}>
              <input
                type="text"
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&ejecutarBusqueda()}
                placeholder={curMode?.ph||"Escribir valor de búsqueda..."}
                style={{
                  width:"100%", fontFamily:MONOS, fontSize:12,
                  padding:"10px 14px", borderRadius:9,
                  border:`1.5px solid ${T.bd2}`, color:T.t1, background:T.panel,
                  outline:"none", transition:"border-color .15s",
                }}
                onFocus={e=>e.target.style.borderColor=T.terrac}
                onBlur={e=>e.target.style.borderColor=T.bd2}
              />
            </div>
            <button onClick={ejecutarBusqueda} disabled={!searchQuery.trim()||searchLoading} style={{
              background:(!searchQuery.trim()||searchLoading) ? T.t4 : T.terrac,
              color:"#fff", border:"none", borderRadius:9,
              padding:"10px 24px", fontFamily:MONOS, fontSize:11, fontWeight:700,
              cursor:(!searchQuery.trim()||searchLoading)?"not-allowed":"pointer",
              display:"flex", alignItems:"center", gap:8, flexShrink:0,
              transition:"all .15s", boxShadow:`0 2px 8px ${T.terrac}44`,
            }}>
              {searchLoading ? "Buscando…" : "⊕ Buscar"}
            </button>
          </div>

          {/* Filtro de fecha para búsqueda */}
          <div style={{borderTop:`1px solid ${T.bd1}`, paddingTop:16}}>
            <div style={{fontFamily:MONOS, fontSize:9.5, color:T.t3, fontWeight:600, letterSpacing:".1em", marginBottom:12, textTransform:"uppercase"}}>
              Rango de fecha (opcional)
            </div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"flex-end"}}>
              {[
                {id:"all",     label:"Cualquier fecha"},
                {id:"today",   label:"Hoy"},
                {id:"week",    label:"Esta semana"},
                {id:"month",   label:"Este mes"},
                {id:"range",   label:"Rango personalizado"},
                {id:"day",     label:"Día específico"},
              ].map(m=>(
                <button key={m.id} onClick={()=>setSearchDateMode(m.id)} style={{
                  background:searchDateMode===m.id ? T.slate : "transparent",
                  color:searchDateMode===m.id ? "#fff" : T.t3,
                  border:`1px solid ${searchDateMode===m.id ? T.slate : T.bd2}`,
                  borderRadius:7, padding:"6px 12px", cursor:"pointer",
                  fontFamily:MONOS, fontSize:10, fontWeight:500, transition:"all .15s",
                }}>{m.label}</button>
              ))}
            </div>
            {searchDateMode==="range" && (
              <div style={{display:"flex", gap:10, marginTop:12, flexWrap:"wrap", alignItems:"flex-end"}}>
                <label style={{display:"flex", flexDirection:"column", gap:4}}>
                  <span style={{fontFamily:MONOS, fontSize:9, color:T.t3, fontWeight:600}}>DESDE</span>
                  <input type="date" value={searchFrom} onChange={e=>setSearchFrom(e.target.value)}
                    style={{fontFamily:MONOS, fontSize:11, padding:"7px 12px", borderRadius:7, border:`1.5px solid ${T.bd2}`, color:T.t1, background:T.panel}}/>
                </label>
                <label style={{display:"flex", flexDirection:"column", gap:4}}>
                  <span style={{fontFamily:MONOS, fontSize:9, color:T.t3, fontWeight:600}}>HASTA</span>
                  <input type="date" value={searchTo} onChange={e=>setSearchTo(e.target.value)}
                    style={{fontFamily:MONOS, fontSize:11, padding:"7px 12px", borderRadius:7, border:`1.5px solid ${T.bd2}`, color:T.t1, background:T.panel}}/>
                </label>
              </div>
            )}
            {searchDateMode==="day" && (
              <div style={{marginTop:12}}>
                <label style={{display:"flex", flexDirection:"column", gap:4}}>
                  <span style={{fontFamily:MONOS, fontSize:9, color:T.t3, fontWeight:600}}>DÍA ESPECÍFICO</span>
                  <input type="date" value={searchDay} onChange={e=>setSearchDay(e.target.value)}
                    style={{fontFamily:MONOS, fontSize:11, padding:"7px 12px", borderRadius:7, border:`1.5px solid ${T.bd2}`, color:T.t1, background:T.panel, width:"fit-content"}}/>
                </label>
              </div>
            )}
          </div>
        </div>

        {/* Nota de implementación técnica */}
        <div style={{background:T.slatePl||T.row2, border:`1px solid ${T.slate}44`, borderRadius:9, padding:"10px 14px", marginBottom:20, display:"flex", gap:10, alignItems:"flex-start"}}>
          <span style={{fontSize:16, flexShrink:0}}>⚙️</span>
          <div style={{fontFamily:MONOS, fontSize:10, color:T.t3, lineHeight:1.7}}>
            <strong style={{color:T.slate}}>Arquitectura de datos:</strong>{" "}
            Búsqueda en BD local PostgreSQL (caché). Sync cada hora 07:00–17:00 CST (L-V) · Cache clear diario 03:00 CST.
            Si el trámite no está en caché → fallback directo al API HubSpot.
          </div>
        </div>

        {/* Estado inicial — sin búsqueda */}
        {searchResults===null && !searchLoading && (
          <div style={{...card(), textAlign:"center", padding:"50px 30px"}}>
            <div style={{fontSize:52, marginBottom:16, opacity:.4}}>⊕</div>
            <div style={{fontFamily:SERIFS, fontSize:18, fontWeight:700, color:T.t1, marginBottom:8}}>
              Ingresa un criterio de búsqueda
            </div>
            <div style={{fontFamily:MONOS, fontSize:11, color:T.t4, lineHeight:1.8}}>
              Busca por expediente catastral, correo electrónico, nombre del solicitante,<br/>
              folio IRCNL, ID de ticket HubSpot o CURP.<br/>
              Puedes combinar con un rango de fechas o un día específico.
            </div>
          </div>
        )}

        {/* Loading */}
        {searchLoading && (
          <div style={{...card(), textAlign:"center", padding:"40px 30px"}}>
            <div style={{fontFamily:MONOS, fontSize:12, color:T.t3, letterSpacing:".08em"}}>Consultando base de datos…</div>
          </div>
        )}

        {/* Resultados */}
        {searchResults!==null && !searchLoading && (
          <div>
            <div style={{fontFamily:MONOS, fontSize:10.5, color:T.t3, marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span>{searchResults.length} resultado{searchResults.length!==1?"s":""} para "{searchQuery}"</span>
              {searchResults.length>0 && <span style={{color:T.t4}}>Clic en una fila para ver el detalle completo</span>}
            </div>

            {searchResults.length===0 ? (
              <div style={{...card(), textAlign:"center", padding:"40px 30px"}}>
                <div style={{fontSize:40, marginBottom:12, opacity:.35}}>○</div>
                <div style={{fontFamily:SERIFS, fontSize:16, fontWeight:700, color:T.t1, marginBottom:6}}>Sin resultados</div>
                <div style={{fontFamily:MONOS, fontSize:11, color:T.t4}}>
                  No se encontraron trámites para "{searchQuery}" en {curMode?.label}.<br/>
                  Verifica el valor o prueba con otro criterio de búsqueda.
                </div>
              </div>
            ) : (
              <div style={{...card(), padding:0, overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table>
                    <thead>
                      <tr>
                        {["ID Ticket","Expediente","Solicitante","Trámite","Tipo","Etapa","Agente","Recepción","Cierre","Tiempo"].map(h=>(
                          <th key={h} style={TH}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {searchResults.map((r,i)=>{
                        const si = STAGES_MAP[r.hs_pipeline_stage]||{label:"–",color:T.t4};
                        const sc = dark ? (STAGE_COLORS_DARK[r.hs_pipeline_stage]||T.t4) : si.color;
                        const tc = r.tipo_tramite==="certificaciones"?T.blue:r.tipo_tramite==="generales"?T.green:T.amber;
                        return (
                          <tr key={r.id} onClick={()=>setSelectedTicket(r)} style={{cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.background=dark?"#1e3050":"#eef3fc"}
                            onMouseLeave={e=>e.currentTarget.style.background=i%2===0?T.card:T.row2}>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:10, color:T.blue, fontWeight:600}}>{r.id}</td>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:11}}>{r.expediente_catastral||"–"}</td>
                            <td style={{...TD(i)}}>
                              <div style={{fontFamily:SERIFS, fontSize:12.5, fontWeight:600, color:T.t1}}>{r.nombre_persona_tramite}</div>
                              <div style={{fontFamily:MONOS, fontSize:10, color:T.t4}}>{r.correo_solicitante}</div>
                            </td>
                            <td style={{...TD(i), maxWidth:200}}>
                              <div style={{fontFamily:SERIFS, fontSize:12, color:T.t2}}>{r.tramite_solicitado1}</div>
                            </td>
                            <td style={TD(i)}><Badge label={r.tipo_tramite} color={tc}/></td>
                            <td style={TD(i)}>
                              <span style={{fontFamily:MONOS, fontSize:10, fontWeight:700, color:sc,
                                background:`${sc}18`, border:`1px solid ${sc}44`, borderRadius:4, padding:"2px 8px"}}>
                                {si.label}
                              </span>
                            </td>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:10.5, color:T.t2}}>{AGENTES[r.hubspot_owner_id]||r.hubspot_owner_id}</td>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:10, color:T.t3}}>{fDate(r.createdate)}</td>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:10, color:r.closed_date?T.green:T.amber}}>
                              {r.closed_date ? fDate(r.closed_date) : "En proceso"}
                            </td>
                            <td style={{...TD(i), fontFamily:MONOS, fontSize:11, color:T.green, fontWeight:700}}>{msToHM(r.time_to_close)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ─── SIDEBAR + TOPBAR + CONTENIDO ────────────────────────────────────────
  return (
    <div style={{display:"flex", minHeight:"100vh", background:T.appBg, fontFamily:SERIFS}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Mono:wght@400;500;600&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:${T.appBg}}
        ::-webkit-scrollbar-thumb{background:${T.bd2};border-radius:3px}
        button{cursor:pointer;outline:none}
        table{border-collapse:collapse;width:100%}
        @keyframes emerge{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .emerge{animation:emerge .3s cubic-bezier(.2,0,.2,1) both}
        @media(max-width:900px){
          .sidebar{position:fixed!important;z-index:999;height:100vh;top:0;left:0}
          .main{margin-left:0!important}
          .g4{grid-template-columns:repeat(2,1fr)!important}
          .g2{grid-template-columns:1fr!important}
          .gchart{grid-template-columns:1fr!important}
        }
        @media(max-width:520px){.g4{grid-template-columns:1fr!important}}
      `}</style>

      {/* SIDEBAR */}
      <div className="sidebar" style={{
        width:navOpen?224:62, minWidth:navOpen?224:62,
        background:T.sidebar, display:"flex", flexDirection:"column",
        transition:"width .25s cubic-bezier(.4,0,.2,1), min-width .25s cubic-bezier(.4,0,.2,1)",
        boxShadow:dark?"3px 0 24px rgba(0,0,0,.7)":"3px 0 20px rgba(28,43,58,.2)",
        flexShrink:0, overflow:"hidden", zIndex:200,
      }}>
        {/* Logo */}
        <div style={{padding:"24px 16px 20px", borderBottom:`1px solid ${T.sidebd}`}}>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <div style={{width:36, height:36, borderRadius:8, flexShrink:0, background:`linear-gradient(135deg, ${T.terrac}, ${T.blue})`, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:MONOS, fontSize:11, fontWeight:600, color:"#fff"}}>IR</div>
            {navOpen&&<div>
              <div style={{fontFamily:SERIFS, fontSize:14, fontWeight:700, color:"#fff", whiteSpace:"nowrap"}}>IRCNL</div>
              <div style={{fontFamily:MONOS, fontSize:8.5, color:"rgba(255,255,255,.38)", whiteSpace:"nowrap", marginTop:2}}>Trámites Catastrales</div>
            </div>}
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1, padding:"10px 0"}}>
          {TABS.map(t=>{
            const active=tab===t.id;
            const isBusq=t.id==="busqueda";
            return (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                display:"flex", alignItems:"center", width:"100%",
                gap:navOpen?13:0, padding:navOpen?"11px 18px":"11px 0",
                justifyContent:navOpen?"flex-start":"center",
                background:active?"rgba(255,255,255,.09)":"transparent",
                border:"none", borderLeft:`3px solid ${active ? (isBusq?T.terrac:T.terrac) : "transparent"}`,
                color:active?"#fff":"rgba(255,255,255,.55)",
                transition:"all .15s",
              }}
              onMouseEnter={e=>{if(!active)e.currentTarget.style.background="rgba(255,255,255,.05)";}}
              onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
                <span style={{fontSize:15, flexShrink:0, width:22, textAlign:"center"}}>{t.icon}</span>
                {navOpen&&<span style={{fontFamily:MONOS, fontSize:12, fontWeight:500, whiteSpace:"nowrap"}}>{t.label}</span>}
                {navOpen&&isBusq&&<span style={{marginLeft:"auto", fontFamily:MONOS, fontSize:8, background:T.terrac, color:"#fff", borderRadius:4, padding:"1px 6px"}}>NUEVO</span>}
                {navOpen&&t.id==="sincronizacion"&&<span style={{marginLeft:"auto", fontFamily:MONOS, fontSize:8, background:T.green, color:"#fff", borderRadius:4, padding:"1px 6px"}}>LIVE</span>}
              </button>
            );
          })}
        </nav>

        {/* Bottom */}
        <div style={{borderTop:`1px solid ${T.sidebd}`, padding:"8px 0"}}>
          <button onClick={()=>setDark(d=>!d)} style={{
            display:"flex", alignItems:"center", gap:12, width:"100%",
            padding:navOpen?"10px 18px":"10px 0", justifyContent:navOpen?"flex-start":"center",
            background:"transparent", border:"none", color:"rgba(255,255,255,.5)", transition:"color .15s",
          }}
          onMouseEnter={e=>e.currentTarget.style.color="#fff"}
          onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.5)"}>
            <span style={{fontSize:16, flexShrink:0, width:22, textAlign:"center"}}>{dark?"☀":"🌙"}</span>
            {navOpen&&<span style={{fontFamily:MONOS, fontSize:11, whiteSpace:"nowrap"}}>{dark?"Modo día":"Modo noche"}</span>}
          </button>
          <button onClick={()=>setNavOpen(o=>!o)} style={{
            display:"flex", alignItems:"center", gap:12, width:"100%",
            padding:navOpen?"10px 18px":"10px 0", justifyContent:navOpen?"flex-start":"center",
            background:"transparent", border:"none", color:"rgba(255,255,255,.3)",
          }}>
            <span style={{fontSize:12, width:22, textAlign:"center"}}>{navOpen?"←":"→"}</span>
            {navOpen&&<span style={{fontFamily:MONOS, fontSize:10}}>Colapsar</span>}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main" style={{flex:1, display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden"}}>
        {/* Topbar */}
        <header style={{height:58, background:T.topbar, borderBottom:`1px solid ${T.bd1}`, padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexShrink:0, boxShadow:T.shadowSm}}>
          <div style={{display:"flex", alignItems:"center", gap:14}}>
            <button onClick={()=>setNavOpen(o=>!o)} style={{background:"none", border:"none", fontSize:18, color:T.t3}}>☰</button>
            <div>
              <div style={{fontFamily:SERIFS, fontSize:15, fontWeight:700, color:T.t1}}>{TABS.find(t=>t.id===tab)?.label}</div>
              <div style={{fontFamily:MONOS, fontSize:9.5, color:T.t4}}>Pipeline Catastro · 19584269 · {N(TOTAL)} tickets</div>
            </div>
          </div>
          <div style={{display:"flex", gap:10, alignItems:"center", flexShrink:0}}>
            {tab!=="busqueda" && (
              <div style={{fontFamily:MONOS, fontSize:10, color:T.slate, background:T.slatePl, border:`1px solid ${T.slate}44`, borderRadius:7, padding:"5px 12px", display:"flex", gap:7, alignItems:"center"}}>
                <span style={{width:7, height:7, borderRadius:"50%", background:T.green, display:"inline-block"}}/>
                📅 {periodoLabel}
              </div>
            )}
            <button onClick={()=>setDark(d=>!d)} style={{width:36, height:36, borderRadius:8, background:T.row2, border:`1px solid ${T.bd1}`, fontSize:16, color:T.t2, display:"flex", alignItems:"center", justifyContent:"center"}} title={dark?"Modo día":"Modo noche"}>{dark?"☀":"🌙"}</button>
          </div>
        </header>

        {/* Scroll area */}
        <main style={{flex:1, overflow:"auto", padding:"22px 24px"}}>

          {/* Period filter (solo en tabs que no son búsqueda) */}
          {tab!=="busqueda" && <PeriodBar/>}

          {/* ══ OVERVIEW ══ */}
          {tab==="overview"&&(
            <div className="emerge">
              <SecHead title="Resumen Ejecutivo" sub={`Pipeline Catastro ${PIPELINE_ID} · ${periodoLabel}`}/>
              <div className="g4" style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:20}}>
                <KPICard value={N(pd.total)} label="Total Trámites"  sub={periodoLabel}                          color={T.blue}   icon="📋" delta={5.7}/>
                <KPICard value={N(pd.cer)}   label="Cerrados"         sub={P(pd.cer,pd.total)+" tasa cierre"}    color={T.green}  icon="✅" delta={8.3}/>
                <KPICard value={N(pd.rech)}  label="Rechazados"       sub={P(pd.rech,pd.total)+" tasa rechazo"}  color={T.red}    icon="❌" delta={-1.2}/>
                <KPICard value={N(pd.enAten)}label="En Atención"      sub="Recib.+Asig.+Proceso"                color={T.amber}  icon="🔄" delta={-2.1}/>
              </div>
              <div className="g4" style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:24}}>
                <KPICard value="< 8 hrs"  label="Tiempo Prom. Cierre"   sub="time_to_close · Meta 2.2 POA"          color={T.green}  icon="⏱"/>
                <KPICard value="< 2 min"  label="Asignación Agente"     sub="hs_time_to_first_rep_assignment"        color={T.teal}   icon="👤"/>
                <KPICard value="~1.2 hrs" label="Primera Respuesta"     sub="time_to_first_agent_reply"              color={T.slate}  icon="💬"/>
                <KPICard value="16.0%"    label="Tasa Rechazo"          sub="stage=Rechazado · Meta 1.3 POA"         color={T.red}    icon="⚠️"/>
              </div>
              <div className="gchart" style={{display:"grid", gridTemplateColumns:"1.6fr 1fr", gap:18, marginBottom:20}}>
                <div style={{...card(), position:"relative", overflow:"hidden"}}>
                  <div style={accentBar(T.blue)}/>
                  <div style={{fontFamily:SERIFS, fontSize:15, fontWeight:700, color:T.t1, marginBottom:16}}>Tendencia Mensual — Sep 2025 / Feb 2026</div>
                  <ResponsiveContainer width="100%" height={215}>
                    <AreaChart data={TREND}>
                      <defs>
                        {[[T.blue,"gB"],[T.green,"gG"]].map(([c,id])=>(
                          <linearGradient key={id} id={id} x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%"  stopColor={c} stopOpacity={dark?.25:.15}/>
                            <stop offset="95%" stopColor={c} stopOpacity={0}/>
                          </linearGradient>
                        ))}
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke={T.bd1}/>
                      <XAxis dataKey="m" tick={{fontFamily:MONOS, fontSize:10, fill:T.t4}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fontFamily:MONOS, fontSize:9, fill:T.t4}} axisLine={false} tickLine={false} tickFormatter={kN}/>
                      <Tooltip content={<ChartTip/>}/>
                      <Area type="monotone" dataKey="rec"  name="Recibidos"  stroke={T.blue}  fill="url(#gB)" strokeWidth={2.5} dot={false}/>
                      <Area type="monotone" dataKey="cer"  name="Cerrados"   stroke={T.green} fill="url(#gG)" strokeWidth={2.5} dot={false}/>
                      <Area type="monotone" dataKey="rech" name="Rechazados" stroke={T.red}   fill="none"     strokeWidth={1.5} strokeDasharray="5 3" dot={false}/>
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
                <div style={{...card(), position:"relative", overflow:"hidden"}}>
                  <div style={accentBar(T.terrac)}/>
                  <div style={{fontFamily:SERIFS, fontSize:15, fontWeight:700, color:T.t1, marginBottom:14}}>Tipo de Trámite</div>
                  <ResponsiveContainer width="100%" height={145}>
                    <PieChart>
                      <Pie data={[{name:"Certificaciones",value:73329},{name:"Generales",value:37205},{name:"Inmobiliarios",value:3916}]} cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={3} dataKey="value">

// LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [user, setUser]     = React.useState('');
  const [pass, setPass]     = React.useState('');
  const [error, setError]   = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const MO = "'DM Mono', monospace";
  const SE = "'Source Serif 4', serif";

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Credenciales incorrectas'); setLoading(false); return; }
      localStorage.setItem('ircnl_token', data.token);
      localStorage.setItem('ircnl_user', JSON.stringify(data.usuario));
      onLogin(data.token, data.usuario);
    } catch(err) {
      setError('Error de conexion con el servidor'); setLoading(false);
    }
  }

  const inputStyle = {
    width: '100%', padding: '10px 14px', border: '1.5px solid #d0dae6',
    borderRadius: 8, fontFamily: MO, fontSize: 13, color: '#1a3a5c',
    outline: 'none', boxSizing: 'border-box'
  };
  const labelStyle = {
    fontFamily: MO, fontSize: 11, color: '#56708a',
    display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1
  };

  return (
    <div style={{minHeight:'100vh', background:'#f5f2ed', display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div style={{background:'#fff', borderRadius:12, padding:'48px 40px', boxShadow:'0 4px 32px rgba(0,0,0,0.10)', width:380, maxWidth:'90vw'}}>
        <div style={{textAlign:'center', marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:12,background:'#1a3a5c',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
            <span style={{color:'#fff',fontSize:24,fontWeight:700}}>IR</span>
          </div>
          <div style={{fontFamily:SE, fontSize:20, fontWeight:700, color:'#1a3a5c'}}>IRCNL</div>
          <div style={{fontFamily:MO, fontSize:11, color:'#7a8fa6', marginTop:4}}>Sistema de Tramites Catastrales</div>
        </div>
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:16}}>
            <label style={labelStyle}>Usuario</label>
            <input type="email" value={user} onChange={e=>setUser(e.target.value)}
              placeholder="nombre.apellido@ircnl.gob.mx" required style={inputStyle}/>
          </div>
          <div style={{marginBottom:24}}>
            <label style={labelStyle}>Contrasena</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              placeholder="••••••••••••" required style={inputStyle}/>
          </div>
          {error && (
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',marginBottom:16,fontFamily:MO,fontSize:12,color:'#dc2626'}}>
              {error}
            </div>
          )}
          <button type="submit" disabled={loading} style={{
            width:'100%', padding:'12px', background:loading?'#7a8fa6':'#1a3a5c',
            color:'#fff', border:'none', borderRadius:8, fontFamily:MO,
            fontSize:13, fontWeight:600, cursor:loading?'not-allowed':'pointer'
          }}>
            {loading ? 'Verificando...' : 'Ingresar'}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:24,fontFamily:MO,fontSize:10,color:'#aab8c8'}}>
          Direccion de Informatica · IRCNL · Acceso restringido
        </div>
      </div>
    </div>
  );
}

// CAMBIO DE PASSWORD OBLIGATORIO
// ═══════════════════════════════════════════════════════════════════════════════
function CambiarPasswordScreen({ token, usuario, onCambiado }) {
  const [nueva, setNueva]       = React.useState('');
  const [confirma, setConfirma] = React.useState('');
  const [error, setError]       = React.useState('');
  const [loading, setLoading]   = React.useState(false);
  const MO = "'DM Mono', monospace";
  const SE = "'Source Serif 4', serif";

  async function handleCambio(e) {
    e.preventDefault();
    if (nueva.length < 12) { setError('Minimo 12 caracteres'); return; }
    if (nueva !== confirma)  { setError('Las contrasenas no coinciden'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch('/auth/cambiar-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ password_nueva: nueva, es_cambio_forzado: true })
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Error al cambiar contrasena'); setLoading(false); return; }
      const usr = JSON.parse(localStorage.getItem('ircnl_user') || '{}');
      usr.debe_cambiar_pass = false;
      localStorage.setItem('ircnl_user', JSON.stringify(usr));
      onCambiado();
    } catch(err) {
      setError('Error de conexion'); setLoading(false);
    }
  }

  const inputStyle = {width:'100%',padding:'10px 14px',border:'1.5px solid #d0dae6',borderRadius:8,fontFamily:MO,fontSize:13,outline:'none',boxSizing:'border-box'};

  return (
    <div style={{minHeight:'100vh',background:'#f5f2ed',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#fff',borderRadius:12,padding:'48px 40px',boxShadow:'0 4px 32px rgba(0,0,0,0.10)',width:400,maxWidth:'90vw'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontFamily:SE,fontSize:18,fontWeight:700,color:'#1a3a5c'}}>Cambio de contrasena requerido</div>
          <div style={{fontFamily:MO,fontSize:11,color:'#7a8fa6',marginTop:8}}>
            Bienvenido {usuario && usuario.nombre_completo}. Establece tu nueva contrasena para continuar.
          </div>
        </div>
        <form onSubmit={handleCambio}>
          <div style={{marginBottom:16}}>
            <label style={{fontFamily:MO,fontSize:11,color:'#56708a',display:'block',marginBottom:6}}>Nueva contrasena (min. 12 caracteres)</label>
            <input type="password" value={nueva} onChange={e=>setNueva(e.target.value)} required style={inputStyle}/>
          </div>
          <div style={{marginBottom:24}}>
            <label style={{fontFamily:MO,fontSize:11,color:'#56708a',display:'block',marginBottom:6}}>Confirmar contrasena</label>
            <input type="password" value={confirma} onChange={e=>setConfirma(e.target.value)} required style={inputStyle}/>
          </div>
          {error && <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',marginBottom:16,fontFamily:MO,fontSize:12,color:'#dc2626'}}>{error}</div>}
          <button type="submit" disabled={loading} style={{width:'100%',padding:'12px',background:loading?'#7a8fa6':'#1a3a5c',color:'#fff',border:'none',borderRadius:8,fontFamily:MO,fontSize:13,fontWeight:600,cursor:loading?'not-allowed':'pointer'}}>
            {loading ? 'Guardando...' : 'Establecer contrasena'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP — Controlador de sesion
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [token,        setToken]        = React.useState(null);
  const [usuario,      setUsuario]      = React.useState(null);
  const [debeCambiar,  setDebeCambiar]  = React.useState(false);
  const [verificado,   setVerificado]   = React.useState(false);

  React.useEffect(() => {
    const tk = localStorage.getItem('ircnl_token');
    if (!tk) { setVerificado(true); return; }
    fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + tk } })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        setToken(tk);
        setUsuario(data.usuario);
        setDebeCambiar(data.usuario && data.usuario.debe_cambiar_pass ? true : false);
        setVerificado(true);
      })
      .catch(() => {
        localStorage.removeItem('ircnl_token');
        localStorage.removeItem('ircnl_user');
        setVerificado(true);
      });
  }, []);

  function handleLogin(tk, usr) {
    setToken(tk);
    setUsuario(usr);
    setDebeCambiar(usr && usr.debe_cambiar_pass ? true : false);
  }

  function handleLogout() {
    fetch('/auth/logout', { method:'POST', headers:{ 'Authorization':'Bearer ' + token } }).catch(()=>{});
    localStorage.removeItem('ircnl_token');
    localStorage.removeItem('ircnl_user');
    setToken(null); setUsuario(null); setDebeCambiar(false);
  }

  if (!verificado)  return React.createElement('div', {id:'loading'}, 'Verificando sesion...');
  if (!token)       return React.createElement(LoginScreen, { onLogin: handleLogin });
  if (debeCambiar)  return React.createElement(CambiarPasswordScreen, { token, usuario, onCambiado: () => setDebeCambiar(false) });
  return React.createElement(AtlasDashboard, { token, usuario, onLogout: handleLogout });
}


    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
